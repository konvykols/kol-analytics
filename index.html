<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOL Performance Summary — Konvy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --paper:#FFFFFF; --surface:#FFFFFF; --surface-2:#F5F5FA; --surface-3:#ECECF4;
  --ink:#17151F; --ink-2:#55525F; --ink-3:#8B8896; --line:#EBEBF2; --line-2:#DBDBE7;
  /* ===== Konvy CI ===== */
  --rose:#F72D74; --rose-d:#D8135F; --rose-t:#FEE3EE;              /* ชมพู primary */
  --purple:#A557F4; --purple-d:#8A32E0; --purple-t:#F1E6FE;        /* ม่วง */
  --blue:#55E5FC; --blue-d:#0C9DC2; --blue-t:#DEF8FD;              /* ฟ้า */
  --green:#12A56E; --green-2:#29D494; --green-t:#E0F8EF;           /* เขียว */
  --yellow:#FFE01C; --yellow-d:#A88A00; --yellow-t:#FFF6C6;        /* เหลือง */
  --red:#E5484D; --red-t:#FDE7E7;
  /* legacy aliases kept for existing refs */
  --plum:#A557F4; --teal:#0C9DC2; --amber:#A88A00; --gold:#A88A00;
  --sh-sm:0 1px 2px rgba(23,21,31,.05); --sh:0 5px 18px -7px rgba(23,21,31,.13);
  --sh-lg:0 18px 48px -18px rgba(23,21,31,.24);
  --r:14px; --r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'IBM Plex Sans Thai',sans-serif;background:var(--paper);color:var(--ink);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.disp{font-family:'Anuphan',sans-serif;letter-spacing:-.01em}
.mono,.num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;font-size:14px;color:var(--ink)}
a{color:var(--rose);text-decoration:none}
::selection{background:var(--rose-t)}

/* ---------- Layout ---------- */
.app{display:flex;flex-direction:column;min-height:100vh}
.appbar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:22px;padding:0 24px;height:58px}
.brand-top{display:flex;align-items:center;gap:10px;flex-shrink:0}
.brand-top .dot{width:28px;height:28px;border-radius:8px;background:var(--rose);
  display:grid;place-items:center;font-family:'Anuphan';font-weight:700;color:#fff;font-size:15px;flex-shrink:0;
  box-shadow:0 3px 10px -2px rgba(247,45,116,.5)}
.brand-top .name{font-family:'Anuphan';font-weight:700;font-size:14.5px;line-height:1.1}
.brand-top .sub{font-size:10.5px;color:var(--ink-3);margin-top:1px;letter-spacing:.02em}
.topnav{display:flex;gap:2px;height:100%;overflow-x:auto;scrollbar-width:none}
.topnav::-webkit-scrollbar{display:none}
.topnav a{display:flex;align-items:center;gap:7px;padding:0 15px;height:100%;font-size:13.5px;
  font-weight:600;color:var(--ink-2);border-bottom:2.5px solid transparent;cursor:pointer;
  transition:.14s;white-space:nowrap}
.topnav a svg{width:16px;height:16px;opacity:.65}
.topnav a:hover{color:var(--ink)}
.topnav a.on{color:var(--rose);border-bottom-color:var(--rose)}
.topnav a.on svg{opacity:1}
.appbar .sp{flex:1}
.appbar-actions{display:flex;gap:7px;align-items:center;flex-shrink:0}
.appbar-actions .btn.ghost{background:transparent;border-color:var(--line-2);color:var(--ink-2)}
.appbar-actions .btn.ghost:hover{background:var(--surface-2);color:var(--ink)}
.ver-tag{position:fixed;bottom:8px;right:10px;font-size:10px;color:var(--line-2);
  font-family:'IBM Plex Mono';pointer-events:none;z-index:5;letter-spacing:.02em}
.ab-div{width:1px;height:22px;background:var(--line-2);margin:0 3px;flex-shrink:0}
.btn.danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn.danger:hover{filter:brightness(.94)}
.klink{color:var(--rose-d);text-decoration:none;font-weight:600}
.klink:hover{text-decoration:underline}
.kol-chk{width:15px;height:15px;cursor:pointer;accent-color:var(--rose)}
.sel-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:12px;
  background:var(--rose-t);border:1px solid var(--rose);border-radius:10px;font-size:13px;color:var(--ink)}
.sel-bar b{color:var(--rose-d)}
.sel-bar .btn{margin-left:2px}
.kol-table{font-size:12px}
.kol-table th,.kol-table td{padding:7px 8px !important}
.kol-table .chip{font-size:10px;padding:1px 6px}
.kol-table .t-name{font-size:12.5px}
.camp-table{font-size:12.5px}
.camp-table th,.camp-table td{padding:9px 8px !important}
.mr-calc{margin:6px 0 4px;border:1px solid var(--line-2);border-radius:10px;overflow:hidden}
.mr-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;
  background:var(--surface-2);border:none;padding:10px 14px;font-family:inherit;font-size:13px;
  font-weight:600;color:var(--ink);cursor:pointer}
.mr-toggle:hover{background:var(--surface-3)}
#mrPanel{padding:12px 14px}
.mr-head{display:grid;grid-template-columns:1fr 1.4fr 1fr 34px;gap:8px;font-size:11px;color:var(--ink-3);margin-bottom:6px;padding:0 2px}
.mr-row{display:grid;grid-template-columns:1fr 1.4fr 1fr 34px;gap:8px;margin-bottom:7px;align-items:center}
.mr-row input,.mr-row select{padding:8px 10px;border:1px solid var(--line-2);border-radius:8px;font-size:13px;width:100%}
.mr-row input:focus,.mr-row select:focus{outline:none;border-color:var(--rose)}
.mr-total{display:flex;align-items:center;gap:12px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);font-size:14px}
.mr-total b{font-family:'Anuphan';font-size:19px;color:var(--rose);font-weight:700}
.mr-total .btn{margin-left:auto}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{min-height:56px;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;
  padding:0 28px;position:sticky;top:58px;z-index:20}
.topbar h1{font-size:18px;font-weight:700}
.topbar .crumb{font-size:12.5px;color:var(--ink-3)}
.topbar .sp{flex:1}
.content{padding:26px 28px 60px;max-width:1360px;width:100%}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;
  font-weight:500;font-size:13.5px;background:var(--surface);border:1px solid var(--line-2);
  color:var(--ink);transition:.14s;box-shadow:var(--sh-sm)}
.btn:hover{border-color:var(--ink-3);background:#fff}
.btn svg{width:16px;height:16px}
.btn.primary{background:var(--rose);border-color:var(--rose);color:#fff}
.btn.primary:hover{background:var(--rose-d);border-color:var(--rose-d)}
.btn.ghost{background:transparent;border-color:transparent;box-shadow:none}
.btn.ghost:hover{background:var(--surface-2)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}

/* ---------- Cards / KPI ---------- */
.grid{display:grid;gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm)}
.card.pad{padding:20px}
.sec-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px}
.sec-title .bar{width:3px;height:16px;border-radius:2px;background:var(--rose)}
.muted{color:var(--ink-3)}

.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;align-items:stretch}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 15px;
  box-shadow:var(--sh-sm);position:relative;overflow:hidden;display:flex;flex-direction:column}
.kpi .k-lab{font-size:10.5px;color:var(--ink-3);font-weight:500;letter-spacing:.01em;
  display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em;min-height:24px;padding-right:18px}
.kpi .k-val{font-family:'Anuphan';font-weight:700;font-size:23px;margin-top:8px;line-height:1;letter-spacing:-.02em}
.kpi .k-val .u{font-size:12px;color:var(--ink-3);font-weight:500;margin-left:2px}
.kpi .k-sub{font-size:10.5px;color:var(--ink-3);margin-top:5px;line-height:1.3}
.kpi .k-ic{position:absolute;top:13px;right:13px;width:15px;height:15px;color:var(--line-2)}
.kpi.hl{background:var(--surface)}
.kpi.big{grid-column:auto}
.kpi.big .k-val{font-size:23px;color:var(--rose)}
.kpi.big.save .k-val{color:var(--green)}
.kpi.big .k-sub{font-size:10.5px;color:var(--ink-3);margin-top:5px}

/* Hero savings */
.hero{background:linear-gradient(120deg,#F72D74 0%,#C438C0 52%,#A557F4 118%);
  color:#fff;border-radius:16px;padding:20px;position:relative;overflow:hidden;box-shadow:0 10px 30px -10px rgba(167,87,244,.5)}
.hero::after{content:"";position:absolute;right:-50px;top:-50px;width:280px;height:280px;
  background:radial-gradient(circle, rgba(255,224,28,.32), transparent 62%);pointer-events:none}
.hero .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#FFE0F0;font-weight:600}
.hero .big{font-family:'Anuphan';font-weight:700;font-size:40px;line-height:1;margin-top:6px;letter-spacing:-.02em}
.hero .big .pct{color:#FFE01C}
.hero .cap{font-size:13px;color:#FCE9F3;margin-top:7px;max-width:520px;line-height:1.35}
.hero .bars{margin-top:14px;display:flex;flex-direction:column;gap:6px;max-width:460px}
.hero .bl{display:flex;align-items:center;gap:10px;font-size:12px}
.hero .bl .t{width:78px;color:#FBE2F0;flex-shrink:0}
.hero .bl .track{flex:1;height:8px;background:rgba(255,255,255,.22);border-radius:5px;overflow:hidden}
.hero .bl .fill{height:100%;border-radius:5px}
.hero .bl .v{width:102px;text-align:right;font-family:'IBM Plex Mono';font-weight:500;flex-shrink:0}

.chart-wrap{position:relative;height:250px}
.chart-wrap.sm{height:210px}

/* ---------- Table ---------- */
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--line);background:var(--surface)}
table{border-collapse:collapse;width:100%;font-size:13px}
thead th{background:var(--surface-2);color:var(--ink-2);font-weight:600;font-size:11.5px;
  text-transform:uppercase;letter-spacing:.04em;text-align:left;padding:11px 13px;
  white-space:nowrap;border-bottom:1px solid var(--line);position:sticky;top:0}
tbody td{padding:11px 13px;border-bottom:1px solid var(--line);white-space:nowrap;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface-2)}
td.num,th.num{text-align:right;font-family:'IBM Plex Mono';font-variant-numeric:tabular-nums}
.t-name{font-weight:600;color:var(--ink)}
.t-click{cursor:pointer}
.t-click:hover .t-name{color:var(--rose)}
tfoot td{padding:11px 13px;background:var(--surface-3);font-weight:600;border-top:2px solid var(--line-2);white-space:nowrap}
tfoot td.num{font-family:'IBM Plex Mono'}

/* chips / badges */
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;
  font-size:11.5px;font-weight:600;line-height:1.4;white-space:nowrap}
.chip.tk{background:#EDEBE9;color:#25201C}
.chip.ig{background:#FCE7F0;color:#B0245F}
.chip.fb{background:#E6EFFB;color:#2059A6}
.chip.x{background:#E9E9EA;color:#2A2A2C}
.chip.yt{background:#FCE6E6;color:#B02020}
.chip.lm{background:#FFF3D9;color:#9A6B0C}
.chip.kc{background:var(--rose-t);color:var(--rose-d)}
.chip.ot{background:var(--surface-3);color:var(--ink-2)}
.chip.nano{background:var(--green-t);color:var(--green)}
.chip.micro{background:var(--blue-t);color:var(--blue-d)}
.chip.macro{background:var(--purple-t);color:var(--purple-d)}
.chip.mega{background:var(--rose-t);color:var(--rose-d)}
.chip.seed{background:var(--green-t);color:var(--green)}
.chip.barter{background:var(--purple-t);color:var(--purple-d)}
.chip.cash{background:var(--yellow-t);color:var(--yellow-d)}
.chip.credit{background:var(--rose-t);color:var(--rose-d)}
.pos{color:var(--green);font-weight:600}
.neg{color:var(--red);font-weight:600}
.pill{display:inline-block;padding:1px 8px;border-radius:6px;font-size:11.5px;font-weight:600;font-family:'IBM Plex Mono'}
.pill.g{background:var(--green-t);color:var(--green)}
.pill.r{background:var(--red-t);color:var(--red)}
.pill.n{background:var(--surface-3);color:var(--ink-2)}
.rk{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:6px;font-size:11.5px;
  font-weight:700;font-family:'IBM Plex Mono';background:var(--surface-3);color:var(--ink-2)}
.rk.g1{background:#FFF0AE;color:#8A7000}.rk.g2{background:#E6E6EC;color:#585866}.rk.g3{background:#F3E0CC;color:#8A5A2E}

/* empty */
.empty{text-align:center;padding:60px 24px;color:var(--ink-3)}
.empty svg{width:44px;height:44px;color:var(--line-2);margin-bottom:14px}
.empty h3{font-size:16px;color:var(--ink-2);margin-bottom:6px;font-weight:600}
.empty p{font-size:13px;max-width:380px;margin:0 auto 18px}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(23,21,31,.45);backdrop-filter:blur(3px);
  z-index:100;display:none;align-items:flex-start;justify-content:center;padding:5vh 18px;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:560px;box-shadow:var(--sh-lg);
  animation:pop .18s ease}
.modal.wide{max-width:820px}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
.modal-h{padding:19px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:16.5px;font-weight:700;flex:1}
.modal-h .x{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3)}
.modal-h .x:hover{background:var(--surface-2);color:var(--ink)}
.modal-b{padding:20px 22px;max-height:66vh;overflow:auto}
.modal-f{padding:15px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field label .hint{font-weight:400;color:var(--ink-3);font-size:11.5px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;
  background:var(--surface);transition:.14s}
.field input:focus,.field select:focus{outline:none;border-color:var(--rose);box-shadow:0 0 0 3px var(--rose-t)}
.f-row{display:grid;gap:13px}
.f-2{grid-template-columns:1fr 1fr}
.f-3{grid-template-columns:1fr 1fr 1fr}
.f-4{grid-template-columns:1fr 1fr 1fr 1fr}
.compute-note{font-size:11px;color:var(--ink-3);padding:4px 2px;
  margin-top:2px;display:flex;gap:6px;align-items:flex-start;line-height:1.4}
.compute-note svg{width:13px;height:13px;flex-shrink:0;color:var(--ink-3);opacity:.7;margin-top:1px}
.compute-note b{color:var(--ink-2);font-weight:600}

/* sub tabs */
.subtabs{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:11px;width:max-content;margin-bottom:20px}
.subtabs button{padding:8px 16px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--ink-2);transition:.14s}
.subtabs button.on{background:var(--surface);color:var(--rose);box-shadow:var(--sh-sm)}

.mini-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.mini{border:1px solid var(--line);border-radius:11px;padding:14px 15px;background:var(--surface)}
.mini .l{font-size:11.5px;color:var(--ink-3);font-weight:500}
.mini .v{font-family:'Anuphan';font-weight:700;font-size:21px;margin-top:5px;letter-spacing:-.01em}
.mini .s{font-size:11px;color:var(--ink-3);margin-top:2px}

.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.inp{padding:8px 12px;border:1px solid var(--line-2);border-radius:9px;background:var(--surface);
  font-size:13px;color:var(--ink);width:100%}
.inp:focus{outline:none;border-color:var(--rose)}
.fl{font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px;font-weight:500}
.fl select{padding:7px 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--surface);
  font-size:12.5px;color:var(--ink);cursor:pointer}
.fl select:focus{outline:none;border-color:var(--rose)}
.toolbar .sp{flex:1}
.search{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line-2);
  border-radius:9px;padding:0 12px;box-shadow:var(--sh-sm)}
.search svg{width:15px;height:15px;color:var(--ink-3)}
.search input{border:none;background:none;padding:9px 0;width:200px}
.search input:focus{outline:none}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:13.5px;font-weight:500;
  box-shadow:var(--sh-lg);z-index:200;opacity:0;transition:.25s;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:#29D494}

.hidden{display:none!important}
.row-act{display:flex;gap:4px}
.icon-btn{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--ink-3);transition:.14s}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.icon-btn.del:hover{background:var(--red-t);color:var(--red)}
.icon-btn svg{width:15px;height:15px}

.drop{border:1.5px dashed var(--line-2);border-radius:12px;padding:26px;text-align:center;
  background:var(--surface-2);transition:.14s;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--rose);background:var(--rose-t)}
.drop svg{width:32px;height:32px;color:var(--ink-3);margin-bottom:10px}
.drop h4{font-size:14px;font-weight:600;margin-bottom:4px}
.drop p{font-size:12.5px;color:var(--ink-3)}
.drop b{color:var(--rose)}

.tag-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ink-3);margin-top:10px}
.tag-legend span{display:flex;align-items:center;gap:5px}
.tag-legend i{width:10px;height:10px;border-radius:3px}

@media(max-width:1080px){.sidebar{width:64px}.brand .name,.brand .sub,.nav-label,.nav a span,.side-foot{display:none}
  .brand{padding:16px 0;text-align:center}.brand .logo{justify-content:center}.nav a{justify-content:center;padding:12px}}
@media(max-width:860px){
  .content .grid[style*="1.55fr"],.content .grid[style*="1.4fr"],
  .content .grid[style*="1fr 1fr"]{grid-template-columns:1fr!important}
}
@media(max-width:920px){.dash-charts{grid-template-columns:1fr !important}}
@media(max-width:720px){.content{padding:18px 14px 50px}.topbar{padding:0 14px;gap:8px}
  .topbar h1{font-size:15.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .topbar .sp{flex:0 0 6px}.crumb{display:none}
  #topActions{flex:0 0 auto;display:flex;gap:6px}
  #topActions .btn{padding:8px 10px;font-size:12px;gap:5px}
  #topActions .btn .lbl-full{display:none}
  .hero .big{font-size:34px}.hero .bl .t{width:70px}.hero .bl .v{width:96px}
  .kpi .k-val{font-size:21px}.kpi{padding:13px 14px}
  .modal-h,.modal-b,.modal-f{padding-left:16px;padding-right:16px}
  .f-3,.f-4{grid-template-columns:1fr 1fr}
}
@media(max-width:620px){
  .appbar{gap:14px;padding-left:15px;padding-right:15px;padding-top:4px;padding-bottom:4px;height:auto;flex-wrap:wrap}
  .topnav{order:3;width:100%;padding-top:10px;border-top:1px solid var(--line)}
  .appbar-actions{gap:6px}

<script>
/* ================= DATA MODEL ================= */
const TIERS=[
  {k:'NANO',label:'NANO',range:'1K–10K',max:10000},
  {k:'MICRO',label:'MICRO',range:'10K–100K',max:100000},
  {k:'MACRO',label:'MACRO',range:'100K–1M',max:1000000},
  {k:'MEGA',label:'MEGA',range:'1M++',max:Infinity},
];
const PLATFORMS=[
  {k:'TikTok',cls:'tk'},{k:'Instagram',cls:'ig'},{k:'Facebook',cls:'fb'},
  {k:'X',cls:'x'},{k:'YouTube',cls:'yt'},{k:'Lemon8',cls:'lm'},
  {k:'KONVY Community',cls:'kc'},{k:'Other',cls:'ot'}
];
const PAYTYPES=[
  {k:'Barter',cls:'barter',short:'Barter'},
  {k:'เงินสด',cls:'cash',short:'เงินสด'},
  {k:'Konvy Credit',cls:'credit',short:'Credit'},
  {k:'ฟรี/Seeding',cls:'seed',short:'ฟรี'}
];
const KOLTYPES=[{k:'KOL'},{k:'KOC Seeding'}];
const platMeta=k=>PLATFORMS.find(p=>p.k===k)||{k:k||'Other',cls:'ot'};
const payMeta=k=>PAYTYPES.find(p=>p.k===k)|| (k==='KOC Seeding'?{k:'KOC Seeding',cls:'seed',short:'Seeding'}:{k:k||'—',cls:'ot',short:k||'—'});
const tierOf=f=>{const n=+f||0;if(n<1000)return '';for(const t of TIERS)if(n<t.max)return t.k;return 'MEGA';};
const tierMeta=k=>k?(TIERS.find(t=>t.k===k)||TIERS[0]):{k:'',label:'< 1K',range:'< 1,000'};

/* ---------- state + storage ---------- */
const KEY='konvy_kol_perf_v1';
let DB={campaigns:[]};
let mem=null; // in-memory fallback if localStorage blocked

function load(){
  try{const r=localStorage.getItem(KEY);if(r){DB=JSON.parse(r);return;}}catch(e){}
  if(mem){DB=mem;return;}
  DB={campaigns:[]};
}
function save(){
  mem=DB;
  try{localStorage.setItem(KEY,JSON.stringify(DB));}catch(e){}
}
const uid=()=>Math.random().toString(36).slice(2,9);

/* ---------- number helpers ---------- */
const N=v=>{if(typeof v==='string')v=v.replace(/[,\s฿]/g,'');const n=+v;return isFinite(n)?n:0;};
const fmt=(v,d=0)=>{const n=+v;if(!isFinite(n))return '—';
  return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});};
const fmtK=v=>{const n=+v||0;if(n>=1e6)return (n/1e6).toFixed(n>=1e7?0:1)+'M';
  if(n>=1e3)return (n/1e3).toFixed(n>=1e4?0:1)+'K';return fmt(n);};
const baht=(v,d=0)=>'฿'+fmt(v,d);
const pct=(v,d=1)=>{const n=+v;if(!isFinite(n))return '—';return n.toFixed(d)+'%';};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---------- KOL derived metrics ---------- */
function kolCalc(k){
  const eng = k.engagement!=null && k.engagement!=='' ? N(k.engagement)
              : N(k.likes)+N(k.comments)+N(k.shares)+N(k.saves);
  const fol=N(k.follower), views=N(k.views), bud=N(k.budget);
  return {
    engagement:eng,
    erFollower: fol? eng/fol*100 : NaN,
    erViews: views? eng/views*100 : NaN,
    viewRate: fol? views/fol*100 : NaN,
    cpv: views? bud/views : NaN,
    cpc: eng? bud/eng : NaN,
    tier: tierOf(fol)
  };
}

/* ---------- campaign roll-up ---------- */
function campCalc(c){
  const kols=c.kols||[];
  let totFollower=0,totViews=0,totEng=0,actualPaid=0;
  const byTier={},byPay={},byPlat={};
  TIERS.forEach(t=>byTier[t.k]=0);
  PAYTYPES.forEach(p=>byPay[p.k]={count:0,budget:0});
  kols.forEach(k=>{
    const m=kolCalc(k);
    totFollower+=N(k.follower); totViews+=N(k.views); totEng+=m.engagement; actualPaid+=N(k.budget);
    byTier[m.tier]=(byTier[m.tier]||0)+1;
    const pk=payMeta(k.paymentType).k; if(!byPay[pk])byPay[pk]={count:0,budget:0};
    byPay[pk].count++; byPay[pk].budget+=N(k.budget);
    const pl=platMeta(k.platform).k;
    if(!byPlat[pl])byPlat[pl]={count:0,follower:0,views:0,eng:0,budget:0};
    byPlat[pl].count++; byPlat[pl].follower+=N(k.follower);
    byPlat[pl].views+=N(k.views); byPlat[pl].eng+=m.engagement; byPlat[pl].budget+=N(k.budget);
  });
  // KOL-only totals (ก่อนรวม Seeding) — ใช้กับ Creator ranking / เกณฑ์รายคน
  const kol={count:kols.length, follower:totFollower, views:totViews, eng:totEng, paid:actualPaid};

  // Seeding เป็นก้อนตามแพลตฟอร์ม (ไม่มีรายชื่อ)
  const seed=c.seeding||[];
  let seedCount=0, seedViews=0, seedEng=0, seedPaid=0;
  seed.forEach(s=>{
    seedCount+=N(s.count); seedViews+=N(s.views); seedEng+=N(s.eng); seedPaid+=N(s.budget);
    const pl=platMeta(s.platform).k;
    if(!byPlat[pl])byPlat[pl]={count:0,follower:0,views:0,eng:0,budget:0};
    byPlat[pl].count+=N(s.count); byPlat[pl].views+=N(s.views);
    byPlat[pl].eng+=N(s.eng); byPlat[pl].budget+=N(s.budget);
  });
  const seeding={count:seedCount, views:seedViews, eng:seedEng, paid:seedPaid, rows:seed};

  // ยอดรวมแคมเปญ = KOL + Seeding
  totViews+=seedViews; totEng+=seedEng; actualPaid+=seedPaid;
  const totCount=kols.length+seedCount;

  const marketRate=N(c.marketRate);
  const costSaving=marketRate-actualPaid;
  const savingPct=marketRate? costSaving/marketRate*100 : NaN;
  const estImp=N(c.estImpression), estEng=N(c.estEngagement);
  return {
    count:totCount, totFollower, totViews, totEng, actualPaid, marketRate,
    costSaving, savingPct, kol, seeding,
    achImp: estImp? totViews/estImp*100 : NaN,
    achEng: estEng? totEng/estEng*100 : NaN,
    cpv: totViews? actualPaid/totViews : NaN,
    er: totViews? totEng/totViews*100 : NaN,
    erFollower: totFollower? totEng/totFollower*100 : NaN,
    byTier, byPay, byPlat, estImp, estEng
  };
}

/* aggregate for dashboard */
function totals(){
  let camps=DB.campaigns.length,kols=0,follower=0,views=0,eng=0,paid=0,market=0,estImp=0,estEng=0;
  const byMonth={},byPlat={},byTier={};
  TIERS.forEach(t=>byTier[t.k]=0);
  DB.campaigns.forEach(c=>{
    const m=campCalc(c);
    kols+=m.count; follower+=m.totFollower; views+=m.totViews; eng+=m.totEng;
    paid+=m.actualPaid; market+=m.marketRate; estImp+=m.estImp; estEng+=m.estEng;
    const mo=c.month||'—';
    if(!byMonth[mo])byMonth[mo]={paid:0,market:0,eng:0,views:0,estImp:0,estEng:0,count:0};
    byMonth[mo].paid+=m.actualPaid; byMonth[mo].market+=m.marketRate;
    byMonth[mo].eng+=m.totEng; byMonth[mo].views+=m.totViews;
    byMonth[mo].estImp+=m.estImp; byMonth[mo].estEng+=m.estEng;
    byMonth[mo].count+=m.count;
    Object.entries(m.byPlat).forEach(([k,v])=>{
      if(!byPlat[k])byPlat[k]={count:0,follower:0,views:0,eng:0};
      byPlat[k].count+=v.count; byPlat[k].follower+=v.follower;
      byPlat[k].views+=v.views; byPlat[k].eng+=v.eng;
    });
    Object.entries(m.byTier).forEach(([k,v])=>byTier[k]+=v);
  });
  return {camps,kols,follower,views,eng,paid,market,estImp,estEng,
    saving:market-paid, savingPct:market?(market-paid)/market*100:NaN,
    cpv:views?paid/views:NaN, er:views?eng/views*100:NaN, erFollower:follower?eng/follower*100:NaN,
    achImp:estImp?views/estImp*100:NaN, achEng:estEng?eng/estEng*100:NaN,
    byMonth,byPlat,byTier};
}

/* ================= ROUTER ================= */
let VIEW="dashboard", CUR=null, SUBTAB="overview", SEARCH="", CMONTH="";
const $=id=>document.getElementById(id);
const content=()=>$('content');

/* ---------- Benchmark (ค่าเฉลี่ยทีม) ---------- */
// ค่าเฉลี่ยจากข้อมูลจริงทั้งหมด ใช้เป็นเกณฑ์ "ควรได้เท่าไหร่"
function teamBenchmark(){
  const t=totals();
  return {
    viewPerFol: t.follower? t.views/t.follower : NaN, // view ต่อ follower เฉลี่ย
    er: t.views? t.eng/t.views*100 : NaN,             // ER (Eng/View) เฉลี่ย
    cpv: t.views? t.paid/t.views : NaN,
    cpe: t.eng? t.paid/t.eng : NaN,
    kols:t.kols, camps:t.camps
  };
}
// เทียบแคมเปญกับ benchmark: คาดว่าควรได้ vs ทำได้จริง
function campBench(m,bm){
  const expViews = isFinite(bm.viewPerFol)? m.totFollower*bm.viewPerFol : NaN;
  const expEng   = isFinite(expViews)&&isFinite(bm.er)? expViews*bm.er/100 : NaN;
  const pViews = expViews? m.totViews/expViews*100 : NaN;
  const pEng   = expEng? m.totEng/expEng*100 : NaN;
  const idx = (isFinite(pViews)&&isFinite(pEng))? (pViews+pEng)/2
            : isFinite(pViews)? pViews : isFinite(pEng)? pEng : NaN;
  return {expViews,expEng,pViews,pEng,idx};
}

function go(v,id){
  VIEW=v; if(id!==undefined)CUR=id;
  document.querySelectorAll('.topnav a[data-view]').forEach(a=>a.classList.toggle('on',a.dataset.view===v));
  render();
  window.scrollTo(0,0);
}
function render(){
  if(VIEW==="dashboard")renderDashboard();
  else if(VIEW==="campaigns")renderCampaigns();
  else if(VIEW==="detail")renderDetail();
  else if(VIEW==="creators")renderCreators();
}

/* ================= DASHBOARD ================= */
function renderDashboard(){
  $('pageTitle').textContent='Dashboard';
  $('crumb').textContent='';
  $('topActions').innerHTML=`<button class="btn primary" onclick="openCampaign()">${plusIco()} เพิ่มแคมเปญ</button>`;
  const t=totals();
  if(t.camps===0){ content().innerHTML=emptyState('ยังไม่มีข้อมูลแคมเปญ',
    'เริ่มต้นด้วยการเพิ่มแคมเปญแรก หรือลองโหลดข้อมูลตัวอย่างเพื่อดูหน้าตาระบบ',
    `<button class="btn primary" onclick="openCampaign()">${plusIco()} เพิ่มแคมเปญ</button>
     <button class="btn" onclick="loadSample()">โหลดข้อมูลตัวอย่าง</button>`); return; }

  const months=Object.keys(t.byMonth);
  content().innerHTML=`
    <div class="kpi-row">
      ${kpiBig('ประหยัด (Cost Eff.)', isFinite(t.savingPct)?pct(t.savingPct,1):'—',
         `฿${fmt(t.saving)} · จ่าย ฿${fmt(t.paid)}`, ico('coin'),'save')}
      ${kpi('แคมเปญ',fmt(t.camps),'',ico('flag'))}
      ${kpi('KOL / KOC',fmt(t.kols),'ราย',ico('users'))}
      ${kpi('Follower รวม',fmtK(t.follower),'',ico('reach'))}
      ${kpi('Impression',fmtK(t.views),'',ico('eye'))}
      ${kpi('Engagement',fmtK(t.eng),'',ico('heart'))}
      ${kpi('ER (Eng/Imp)',isFinite(t.er)?pct(t.er,2):'—','',ico('heart'))}
      ${kpi('CPV เฉลี่ย',isFinite(t.cpv)?baht(t.cpv,2):'—','',ico('coin'))}
      ${kpi('Achieve Imp.',isFinite(t.achImp)?pct(t.achImp,0):'—',t.estImp?`เป้า ${fmtK(t.estImp)}`:'—',ico('eye'))}
    </div>

    <div class="grid dash-charts" style="grid-template-columns:1fr 1fr 1fr;margin-top:18px">
      <div class="card pad">
        <div class="toolbar" style="margin-bottom:16px">
          <div class="sec-title"><span class="bar"></span>Impression · Est vs Actual</div>
          <div class="sp"></div>
          ${achBadge(t.achImp)}
        </div>
        <div class="chart-wrap sm"><canvas id="chImp"></canvas></div>
      </div>
      <div class="card pad">
        <div class="toolbar" style="margin-bottom:16px">
          <div class="sec-title"><span class="bar"></span>Engagement · Est vs Actual</div>
          <div class="sp"></div>
          ${achBadge(t.achEng)}
        </div>
        <div class="chart-wrap sm"><canvas id="chEng"></canvas></div>
      </div>
      <div class="card pad">
        <div class="sec-title" style="margin-bottom:16px"><span class="bar"></span>จำนวน KOL ที่ใช้ต่อเดือน</div>
        <div class="chart-wrap sm"><canvas id="chKolMonth"></canvas></div>
      </div>
    </div>

    <div class="card pad" style="margin-top:18px">
      <div class="toolbar" style="margin-bottom:14px">
        <div class="sec-title"><span class="bar"></span>สรุปแคมเปญทั้งหมด</div>
        <div class="sp"></div>
        <button class="btn sm" onclick="go('campaigns')">ดูทั้งหมด →</button>
      </div>
      ${campaignTable(DB.campaigns.slice().reverse().slice(0,8))}
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr;margin-top:18px">
      <div class="card pad">
        <div class="sec-title" style="margin-bottom:16px"><span class="bar"></span>สัดส่วน Follower ตามแพลตฟอร์ม</div>
        <div class="chart-wrap sm"><canvas id="chPlat"></canvas></div>
      </div>
      <div class="card pad">
        <div class="sec-title" style="margin-bottom:16px"><span class="bar"></span>จำนวน Content ตามแพลตฟอร์ม</div>
        <div class="chart-wrap sm"><canvas id="chContent"></canvas></div>
      </div>
    </div>`;
  drawEstActual('chImp',t.byMonth,'imp'); drawEstActual('chEng',t.byMonth,'eng');
  drawKolMonthChart(t.byMonth); drawPlatChart(t.byPlat); drawContentChart(t.byPlat);
}

function drawKolMonthChart(byMonth){
  kill('chKolMonth');const ctx=$('chKolMonth');if(!ctx)return;
  const labels=sortMonths(Object.keys(byMonth));
  charts.chKolMonth=new Chart(ctx,{type:'bar',
    data:{labels,datasets:[{label:'จำนวน KOL/KOC',data:labels.map(l=>byMonth[l].count),
      backgroundColor:'#29D494',borderRadius:6,barPercentage:.6}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+' ราย'}}},
      scales:{y:{beginAtZero:true,ticks:{precision:0},grid:{color:'#EEEEF5'}},x:{grid:{display:false}}}}});
}
function drawContentChart(byPlat){
  kill('chContent');const ctx=$('chContent');if(!ctx)return;
  const ks=Object.keys(byPlat);
  if(!ks.length){ctx.parentElement.innerHTML='<div class="empty" style="padding:30px">ยังไม่มีข้อมูล</div>';return;}
  const sorted=ks.map(k=>({k,v:byPlat[k].count})).sort((a,b)=>b.v-a.v);
  charts.chContent=new Chart(ctx,{type:'bar',
    data:{labels:sorted.map(s=>s.k),datasets:[{label:'จำนวน Content',data:sorted.map(s=>s.v),
      backgroundColor:sorted.map((_,i)=>PAL[i%PAL.length]),borderRadius:6,barPercentage:.66}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x+' ชิ้น'}}},
      scales:{x:{beginAtZero:true,ticks:{precision:0},grid:{color:'#EEEEF5'}},y:{grid:{display:false}}}}});
}

function achBadge(v){
  if(!isFinite(v))return '<span class="pill n">Achieve —</span>';
  const cls=v>=100?'g':v>=70?'n':'r';
  return `<span class="pill ${cls}" style="font-size:12px">Achieve ${pct(v,0)}</span>`;
}

function kpiBig(lab,val,sub,icon,cls=''){
  return `<div class="kpi big ${cls}">
    <div class="k-lab">${lab}</div>
    <div class="k-val">${val}</div>
    <div class="k-sub">${sub}</div>
    <div class="k-ic">${icon}</div></div>`;
}

function kpi(lab,val,unit,icon,cls=''){
  return `<div class="kpi ${cls}">
    <div class="k-lab">${lab}</div>
    <div class="k-val">${val}${unit?`<span class="u">${unit}</span>`:''}</div>
    <div class="k-ic">${icon}</div></div>`;
}

/* ================= CREATOR LEADERBOARD ================= */
let CRE_SORT='eng', CRE_PLAT='', CRE_TIER='', CRE_Q='';

// 1 แถว = 1 งาน (KOL 1 คนใน 1 แคมเปญ) — ไม่รวมค่าข้ามแคมเปญ ชื่อซ้ำได้
function creatorList(){
  const arr=[];
  DB.campaigns.forEach(c=>{
    (c.kols||[]).forEach(k=>{
      const name=(k.name||'').trim(); if(!name)return;
      const x=kolCalc(k);
      const fol=N(k.follower);
      arr.push({
        name, campId:c.id, campName:c.name||'(ไม่มีชื่อ)', month:c.month||'', brand:c.brand||'',
        platform:platMeta(k.platform).k, platforms:[platMeta(k.platform).k],
        budget:N(k.budget), follower:fol, views:N(k.views), eng:x.engagement,
        er: isFinite(x.erViews)? x.erViews : NaN,       // ER (Eng/View)
        erFollower: isFinite(x.erFollower)? x.erFollower : NaN,
        cpv: isFinite(x.cpv)? x.cpv : NaN,
        cpc: isFinite(x.cpc)? x.cpc : NaN,
        tier: x.tier
      });
    });
  });
  // rating รายงาน: เทียบ median ER (Eng/View) และ median CPV ของ "ทุกงาน"
  const ers=arr.map(a=>a.er).filter(isFinite).sort((a,b)=>a-b);
  const cpvs=arr.map(a=>a.cpv).filter(isFinite).sort((a,b)=>a-b);
  const med=a=>a.length?a[Math.floor(a.length/2)]:NaN;
  const mER=med(ers), mCPV=med(cpvs);
  arr.forEach(a=>{
    const goodER=isFinite(a.er)&&isFinite(mER)&&a.er>=mER;
    const goodCPV=a.budget===0||(isFinite(a.cpv)&&isFinite(mCPV)&&a.cpv<=mCPV);
    a.rate = (goodER&&goodCPV)?'top' : (goodER||goodCPV)?'good' : 'ok';
  });
  return arr;
}

function drawCreatorChart(top){

// การ์ด Benchmark: เทียบกับค่าเฉลี่ยทีม (ควรได้เท่าไหร่ vs ทำได้จริง)
function benchmarkCard(m){
  const bm=teamBenchmark();
  const bc=campBench(m,bm);
  if(!isFinite(bc.idx)) return '';
  const success = bc.idx>=100;
  const badge = `<span class="pill ${bc.idx>=100?'g':bc.idx>=80?'n':'r'}" style="font-size:12px">${success?'✓ เหนือค่าเฉลี่ยทีม':'ต่ำกว่าค่าเฉลี่ยทีม'} · ${pct(bc.idx,0)}</span>`;
  const row=(label,exp,act,p)=>`<tr>
      <td>${label}</td>
      <td class="num">${isFinite(exp)?fmt(Math.round(exp)):'—'}</td>

let KOL_SORT='engagement';
let KOL_SEL=new Set(), KOL_SEL_CID=null;
function toggleKolSel(id){KOL_SEL.has(id)?KOL_SEL.delete(id):KOL_SEL.add(id);updBulkBar();}
function toggleKolSelAll(checked,cid){
  const c=DB.campaigns.find(x=>x.id===cid);
  if(checked)(c.kols||[]).forEach(k=>KOL_SEL.add(k.id)); else KOL_SEL.clear();
  document.querySelectorAll('.kol-chk').forEach(cb=>cb.checked=checked);
  updBulkBar();
}
function updBulkBar(){const bar=$('selBar');if(bar){bar.style.display=KOL_SEL.size?'flex':'none';const c=$('selCount');if(c)c.textContent=KOL_SEL.size;}
  const hdr=document.querySelector('.kol-table thead .kol-chk');if(hdr){const c=DB.campaigns.find(x=>x.id===KOL_SEL_CID);hdr.checked=c&&c.kols.length&&c.kols.every(k=>KOL_SEL.has(k.id));}}
function clearKolSel(){KOL_SEL.clear();document.querySelectorAll('.kol-chk').forEach(cb=>cb.checked=false);updBulkBar();}
function bulkDelKol(cid){
  if(!KOL_SEL.size)return;
  const c=DB.campaigns.find(x=>x.id===cid);
  confirmModal(`ลบ ${KOL_SEL.size} รายการที่เลือก?`,'ลบพร้อมกันทั้งหมด กู้คืนไม่ได้',()=>{
    c.kols=(c.kols||[]).filter(k=>!KOL_SEL.has(k.id));KOL_SEL.clear();save();toast('ลบรายการที่เลือกแล้ว');renderDetail();});
}
function detailKol(c,m){
  if(KOL_SEL_CID!==c.id){KOL_SEL.clear();KOL_SEL_CID=c.id;}
  const kols=(c.kols||[]).map(k=>({...k,_c:kolCalc(k)}));
  // ranking maps
  const byEng=[...kols].sort((a,b)=>b._c.engagement-a._c.engagement);
  const byView=[...kols].sort((a,b)=>N(b.views)-N(a.views));
  const rkEng=new Map(byEng.map((k,i)=>[k.id,i+1]));
  const rkView=new Map(byView.map((k,i)=>[k.id,i+1]));
  // apply sort
  const sorted=[...kols].sort((a,b)=>{
    if(KOL_SORT==='engagement')return b._c.engagement-a._c.engagement;
    if(KOL_SORT==='views')return N(b.views)-N(a.views);
    if(KOL_SORT==='er')return (b._c.erViews||0)-(a._c.erViews||0);
    if(KOL_SORT==='cpv')return (a._c.cpv||1e12)-(b._c.cpv||1e12);
    if(KOL_SORT==='budget')return N(b.budget)-N(a.budget);
    return 0;});

  const head=`<div class="toolbar">
    <button class="btn primary sm" onclick="openKol('${c.id}')">${plusIco()} เพิ่ม KOL</button>
    <button class="btn sm" onclick="triggerImport('${c.id}')">${ico('upload')} นำเข้า CSV</button>
    <button class="btn sm" onclick="exportKol('${c.id}')">${ico('download')} ส่งออก CSV</button>
    <button class="btn sm ghost" onclick="downloadTemplate()">ดาวน์โหลดเทมเพลต</button>
    <div class="sp"></div>
    <label class="muted" style="font-size:12.5px">เรียงตาม
      <select onchange="KOL_SORT=this.value;renderDetail()" style="margin-left:6px;padding:6px 10px;border:1px solid var(--line-2);border-radius:8px">
        <option value="engagement"${KOL_SORT==='engagement'?' selected':''}>Engagement</option>
        <option value="views"${KOL_SORT==='views'?' selected':''}>Views</option>
        <option value="er"${KOL_SORT==='er'?' selected':''}>ER (Eng/View)</option>
        <option value="cpv"${KOL_SORT==='cpv'?' selected':''}>CPV (ถูกสุด)</option>
        <option value="budget"${KOL_SORT==='budget'?' selected':''}>งบ</option>
      </select></label>
  </div>`;

  if(!kols.length){$('subContent').innerHTML=head+`
    <div class="drop" id="dropZone" onclick="triggerImport('${c.id}')">
      ${ico('upload')}<h4>ลากไฟล์ CSV มาวาง หรือคลิกเพื่อเลือก</h4>
      <p>คอลัมน์: ชื่อ KOL, แพลตฟอร์ม, ประเภทการจ่ายเงิน, งบประมาณ, ผู้ติดตาม, วิว/Impression, ไลก์, คอมเมนต์, แชร์, บันทึก</p>
    </div>
    ${emptyState('ยังไม่มี KOL รายคนในแคมเปญนี้','เพิ่มทีละคน หรืออัปโหลด CSV — หรือถ้าเป็นงาน Seeding ให้กรอกยอดรวมด้านล่าง',
      `<button class="btn primary" onclick="openKol('${c.id}')">${plusIco()} เพิ่ม KOL</button>`)}
    ${seedingSection(c,m)}`;
    setupDrop(c.id);return;}

  const rows=sorted.map(k=>{
    const x=k._c,pm=platMeta(k.platform),py=payMeta(k.paymentType),tm=tierMeta(x.tier);
    const re=rkEng.get(k.id),rv=rkView.get(k.id);
    const nameHtml=k.link
      ? `<a href="${esc(k.link)}" target="_blank" rel="noopener" class="klink">${esc(k.name||'—')} ↗</a>`
      : esc(k.name||'—');
    const kt=k.kolType||'KOL';
    return `<tr>
      <td><input type="checkbox" class="kol-chk" ${KOL_SEL.has(k.id)?'checked':''} onchange="toggleKolSel('${k.id}')"></td>
      <td>${rankBadge(re)}</td>
      <td>${rankBadge(rv)}</td>
      <td><div class="t-name">${nameHtml}</div>
        <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">
          <span class="chip ${tm.k.toLowerCase()}" style="font-size:10px;padding:1px 6px">${tm.label}</span>
          <span class="chip ${kt==='KOC Seeding'?'seed':'ot'}" style="font-size:10px;padding:1px 6px">${esc(kt)}</span></div></td>
      <td><span class="chip ${pm.cls}">${esc(pm.k)}</span></td>
      <td><span class="chip ${py.cls}">${esc(py.short)}</span></td>
      <td class="num">${baht(k.budget)}</td>
      <td class="num">${fmt(k.follower)}</td>
      <td class="num">${fmt(k.views)}</td>
      <td class="num">${fmt(k.likes)}</td>
      <td class="num">${fmt(k.comments)}</td>
      <td class="num">${fmt(k.shares)}</td>
      <td class="num">${fmt(k.saves)}</td>
      <td class="num" style="font-weight:600">${fmt(x.engagement)}</td>
      <td class="num">${isFinite(x.erFollower)?pct(x.erFollower,2):'—'}</td>
      <td class="num">${isFinite(x.erViews)?pct(x.erViews,2):'—'}</td>
      <td class="num">${isFinite(x.viewRate)?pct(x.viewRate,1):'—'}</td>
      <td class="num">${isFinite(x.cpv)?baht(x.cpv,2):'—'}</td>
      <td class="num">${isFinite(x.cpc)?baht(x.cpc,2):'—'}</td>
      <td class="row-act">
        <button class="icon-btn" onclick="openKol('${c.id}','${k.id}')">${ico('edit')}</button>
        <button class="icon-btn del" onclick="delKol('${c.id}','${k.id}')">${ico('trash')}</button></td>
    </tr>`;}).join('');

  // footer totals
  let tf=0,tv=0,tl=0,tc=0,ts=0,tsv=0,teng=0,tb=0;
  kols.forEach(k=>{tf+=N(k.follower);tv+=N(k.views);tl+=N(k.likes);tc+=N(k.comments);
    ts+=N(k.shares);tsv+=N(k.saves);teng+=k._c.engagement;tb+=N(k.budget);});
  const fER=tf?teng/tf*100:NaN,fCPV=tv?tb/tv:NaN,fCPC=teng?tb/teng:NaN,fVR=tf?tv/tf*100:NaN,fERv=tv?teng/tv*100:NaN;

  $('subContent').innerHTML=head+`
    <div class="sel-bar" id="selBar" style="display:${KOL_SEL.size?'flex':'none'}">
      <input type="checkbox" checked onchange="clearKolSel()" style="width:15px;height:15px;accent-color:var(--rose);cursor:pointer">
      <span>เลือก <b id="selCount">${KOL_SEL.size}</b> รายการ</span>
      <button class="btn sm danger" onclick="bulkDelKol('${c.id}')">${ico('trash')} ลบที่เลือก</button>
      <button class="btn sm ghost" onclick="clearKolSel()">ยกเลิก</button>
    </div>
    <div class="tbl-wrap"><table class="kol-table">
      <thead><tr>
        <th style="width:34px"><input type="checkbox" class="kol-chk" onchange="toggleKolSelAll(this.checked,'${c.id}')" ${kols.length&&kols.every(k=>KOL_SEL.has(k.id))?'checked':''}></th>
        <th title="อันดับ Engagement">R.Eng</th><th title="อันดับ Views">R.View</th>
        <th>KOL</th><th>Platform</th><th>จ่ายเงิน</th><th class="num">งบ</th>
        <th class="num">Follower</th><th class="num">Views/Imp</th>
        <th class="num">Likes</th><th class="num">Cmt</th><th class="num">Share</th><th class="num">Save</th>
        <th class="num">Engage</th><th class="num">ER/Fol</th><th class="num">ER/View</th>
        <th class="num">View Rate</th><th class="num">CPV</th><th class="num">CPE</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr>
        <td></td><td></td><td></td><td>รวม ${kols.length} ราย</td><td></td><td></td>
        <td class="num">${baht(tb)}</td><td class="num">${fmt(tf)}</td><td class="num">${fmt(tv)}</td>
        <td class="num">${fmt(tl)}</td><td class="num">${fmt(tc)}</td><td class="num">${fmt(ts)}</td><td class="num">${fmt(tsv)}</td>
        <td class="num">${fmt(teng)}</td><td class="num">${isFinite(fER)?pct(fER,2):'—'}</td>
        <td class="num">${isFinite(fERv)?pct(fERv,2):'—'}</td><td class="num">${isFinite(fVR)?pct(fVR,1):'—'}</td>
        <td class="num">${isFinite(fCPV)?baht(fCPV,2):'—'}</td><td class="num">${isFinite(fCPC)?baht(fCPC,2):'—'}</td><td></td>
      </tr></tfoot>
    </table></div>
    <div class="tag-legend">
      <span><i style="background:var(--rose)"></i>ER, CPV, CPE, View Rate คำนวณอัตโนมัติจากข้อมูลที่กรอก</span>
    </div>
    ${seedingSection(c,m)}`;
}

/* ---------- KOC Seeding (ยอดรวมตามแพลตฟอร์ม) ---------- */
function seedingSection(c,m){
  const seed=c.seeding||[];
  const rows=seed.map(s=>{
    const pm=platMeta(s.platform);
    const er=N(s.views)?N(s.eng)/N(s.views)*100:NaN;
    const cpv=N(s.views)?N(s.budget)/N(s.views):NaN;
    return `<tr>
      <td><span class="chip ${pm.cls}">${esc(pm.k)}</span></td>
      <td class="num">${fmt(s.count)}</td>
      <td class="num">${fmt(s.views)}</td>
      <td class="num">${fmt(s.eng)}</td>
      <td class="num">${baht(s.budget)}</td>
      <td class="num">${isFinite(er)?pct(er,2):'—'}</td>
      <td class="num">${isFinite(cpv)?baht(cpv,2):'—'}</td>
      <td class="row-act">
        <button class="icon-btn" onclick="openSeeding('${c.id}','${s.id}')">${ico('edit')}</button>
        <button class="icon-btn del" onclick="delSeeding('${c.id}','${s.id}')">${ico('trash')}</button></td>
    </tr>`;}).join('');
  const sd=m.seeding;
  const foot=seed.length>1?`<tfoot><tr>
    <td>รวม Seeding</td><td class="num">${fmt(sd.count)}</td><td class="num">${fmt(sd.views)}</td>
    <td class="num">${fmt(sd.eng)}</td><td class="num">${baht(sd.paid)}</td>
    <td class="num">${sd.views?pct(sd.eng/sd.views*100,2):'—'}</td>
    <td class="num">${sd.views?baht(sd.paid/sd.views,2):'—'}</td><td></td>
  </tr></tfoot>`:'';

  return `<div style="margin-top:26px">
    <div class="toolbar">
      <div class="sec-title"><span class="bar"></span>KOC Seeding <span class="muted" style="font-size:12px;font-weight:400">· กรอกยอดรวมตามแพลตฟอร์ม (ไม่ต้องรายคน)</span></div>
      <div class="sp"></div>
      <button class="btn primary sm" onclick="openSeeding('${c.id}')">${plusIco()} เพิ่ม Seeding</button>
    </div>
    ${seed.length? `<div class="tbl-wrap"><table>
      <thead><tr><th>Platform</th><th class="num">จำนวนคน</th><th class="num">Impression</th>
        <th class="num">Engagement</th><th class="num">งบรวม</th><th class="num">ER (Eng/View)</th><th class="num">CPV</th><th></th></tr></thead>
      <tbody>${rows}</tbody>${foot}
    </table></div>`
    : `<div class="empty" style="padding:24px"><p style="color:var(--ink-3);font-size:13px">ยังไม่มีข้อมูล Seeding — กด "เพิ่ม Seeding" เพื่อกรอกยอดรวม เช่น TikTok 63 คน, Impression 28,905, Engagement 1,693, งบ 36,000</p></div>`}
  </div>`;
}

function openSeeding(cid,sid){
  const c=DB.campaigns.find(x=>x.id===cid);
  const s=sid?(c.seeding||[]).find(x=>x.id===sid):{};
  showModal(`<div class="modal"><div class="modal-h">
    <h3>${sid?'แก้ไข':'เพิ่ม'} KOC Seeding</h3><button class="x" onclick="closeModal()">${ico('close')}</button></div>
    <div class="modal-b">
      <div class="f-row f-2">
        <div class="field"><label>แพลตฟอร์ม</label>
          <select id="sPlat">${PLATFORMS.map(p=>`<option value="${p.k}"${s.platform===p.k?' selected':''}>${p.k}</option>`).join('')}</select></div>
        <div class="field"><label>จำนวนคน (KOC)</label>
          <input id="sCount" type="number" value="${s.count??''}" placeholder="0"></div>
      </div>
      <div class="f-row f-3">
        <div class="field"><label>Impression รวม</label>
          <input id="sViews" type="number" value="${s.views??''}" placeholder="0"></div>
        <div class="field"><label>Engagement รวม</label>
          <input id="sEng" type="number" value="${s.eng??''}" placeholder="0"></div>
        <div class="field"><label>งบรวม (฿)</label>

/* ================= CSV ================= */
function parseCSV(text){
  text=text.replace(/^\uFEFF/,'');
  const rows=[];let row=[],cur='',q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;
      else if(ch===','){row.push(cur);cur='';}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';}
      else if(ch==='\r'){}
      else cur+=ch;}}
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  return rows.filter(r=>r.some(c=>c.trim()!==''));
}
const KOL_COLS=[
  {key:'name',aliases:['ชื่อ kol','ชื่อ','kol','name','handle','ชื่อ influencer']},
  {key:'platform',aliases:['แพลตฟอร์ม','platform','ช่องทาง']},
  {key:'kolType',aliases:['ประเภท kol','ประเภทkol','kol type','koltype']},
  {key:'paymentType',aliases:['ประเภทการจ่ายเงิน','ประเภทงาน','ประเภท','payment','type','ประเภทการจ้าง']},
  {key:'budget',aliases:['งบประมาณ','งบ','budget','cost','ค่าจ้าง']},
  {key:'follower',aliases:['ผู้ติดตาม','follower','followers','ยอดผู้ติดตาม']},
  {key:'views',aliases:['วิว/impression','วิว','views','impression','view','การมองเห็น']},
  {key:'likes',aliases:['ไลก์','likes','like','ถูกใจ']},
  {key:'comments',aliases:['คอมเมนต์','comments','comment','ความคิดเห็น']},
  {key:'shares',aliases:['แชร์','shares','share']},
  {key:'saves',aliases:['บันทึก','saves','save','เซฟ']},
  {key:'link',aliases:['ลิงก์งาน','ลิงก์','ลิ้งค์','ลิงค์','link','url']},
];
function mapHeaders(hdr){
  const norm=hdr.map(h=>h.trim().toLowerCase());
  const map={};
  KOL_COLS.forEach(col=>{
    let idx=-1;
    for(const a of col.aliases){idx=norm.findIndex(h=>h===a);if(idx>=0)break;}
    if(idx<0)for(const a of col.aliases){idx=norm.findIndex(h=>h.includes(a));if(idx>=0)break;}
    map[col.key]=idx;});
  return map;
}
function matchPlatform(v){if(!v)return 'Other';const s=v.trim().toLowerCase();
  const hit=PLATFORMS.find(p=>p.k.toLowerCase()===s||s.includes(p.k.toLowerCase())||p.k.toLowerCase().includes(s));
  if(hit)return hit.k;if(s.includes('ig')||s.includes('insta'))return 'Instagram';
  if(s.includes('fb')||s.includes('face'))return 'Facebook';if(s.includes('tik')||s==='tt')return 'TikTok';
  if(s.includes('yt')||s.includes('you'))return 'YouTube';if(s==='x'||s.includes('twit'))return 'X';return 'Other';}
function matchPay(v){if(!v)return 'Barter';const s=v.trim().toLowerCase();
  if(s.includes('seed')||s.includes('koc')||s.includes('ฟรี')||s.includes('free'))return 'ฟรี/Seeding';
  if(s.includes('barter'))return 'Barter';
  if(s.includes('credit')||s.includes('เครดิต')||s.includes('konvy'))return 'Konvy Credit';
  if(s.includes('เงินสด')||s.includes('cash'))return 'เงินสด';return v.trim();}
function matchKolType(v){const s=(v||'').trim().toLowerCase();
  return (s.includes('seed')||s.includes('koc'))?'KOC Seeding':'KOL';}

$('fileInput').addEventListener('change',e=>{const f=e.target.files[0];if(f)readImport(f);e.target.value='';});
function readImport(file){
  const rd=new FileReader();
  rd.onload=()=>{try{doImport(rd.result);}catch(err){toast('อ่านไฟล์ไม่สำเร็จ');console.error(err);}};
  rd.readAsText(file,'UTF-8');
}
function doImport(text){
  const rows=parseCSV(text);
  if(rows.length<2){toast('ไฟล์ว่างหรือไม่มีข้อมูล');return;}
  const map=mapHeaders(rows[0]);
  if(map.name<0){toast('ไม่พบคอลัมน์ "ชื่อ KOL" — โหลดเทมเพลตเพื่อดูรูปแบบ');return;}
  const c=DB.campaigns.find(x=>x.id===importTarget);if(!c)return;
  let n=0;
  for(let i=1;i<rows.length;i++){const r=rows[i];const g=k=>map[k]>=0?(r[map[k]]||'').trim():'';
    const name=g('name');if(!name)continue;
    c.kols.push({id:uid(),name,platform:matchPlatform(g('platform')),kolType:matchKolType(g('kolType')),paymentType:matchPay(g('paymentType')),link:g('link'),
      budget:N(g('budget')),follower:N(g('follower')),views:N(g('views')),
      likes:N(g('likes')),comments:N(g('comments')),shares:N(g('shares')),saves:N(g('saves'))});n++;}
  save();toast(`นำเข้า ${n} KOL สำเร็จ`);if(VIEW==='detail')renderDetail();else render();
}
function setupDrop(cid){const dz=$('dropZone');if(!dz)return;

  dz.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f){importTarget=cid;readImport(f);}});}

function csvCell(v){v=String(v??'');return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadCSV(name,rows){
  const csv='\uFEFF'+rows.map(r=>r.map(csvCell).join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ================= CHARTS ================= */
let charts={};
const CFONT="'IBM Plex Sans Thai', sans-serif";
Chart.defaults.font.family=CFONT;Chart.defaults.color='#8B8896';
const PAL=['#F72D74','#A557F4','#55E5FC','#29D494','#FFE01C','#8A32E0','#0C9DC2'];
function kill(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
const monthOrder=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const monthTH={JAN:'ม.ค.',FEB:'ก.พ.',MAR:'มี.ค.',APR:'เม.ย.',MAY:'พ.ค.',JUN:'มิ.ย.',JUL:'ก.ค.',AUG:'ส.ค.',SEP:'ก.ย.',OCT:'ต.ค.',NOV:'พ.ย.',DEC:'ธ.ค.'};
function monthOptions(sel){
  return `<option value="">— เลือกเดือน —</option>`+
    monthOrder.map(m=>`<option value="${m}"${(sel||'').toUpperCase().slice(0,3)===m?' selected':''}>${m} · ${monthTH[m]}</option>`).join('');
}
function yearOptions(sel){
  const now=new Date().getFullYear();
  const top=Math.max(2030,now+1);
  const years=[]; for(let y=top;y>=now-2;y--)years.push(y);
  return `<option value="">— ปี —</option>`+
    years.map(y=>`<option value="${y}"${+sel===y?' selected':''}>${y}</option>`).join('');
}
function sortMonths(arr){return arr.sort((a,b)=>{const ia=monthOrder.indexOf((a||'').toUpperCase().slice(0,3)),ib=monthOrder.indexOf((b||'').toUpperCase().slice(0,3));if(ia<0&&ib<0)return 0;if(ia<0)return 1;if(ib<0)return -1;return ia-ib;});}

function drawEstActual(canvasId,byMonth,kind){
  kill(canvasId);const ctx=$(canvasId);if(!ctx)return;
  const labels=sortMonths(Object.keys(byMonth));
  const estKey=kind==='imp'?'estImp':'estEng';
  const actKey=kind==='imp'?'views':'eng';
  const est=labels.map(l=>byMonth[l][estKey]);
  const act=labels.map(l=>byMonth[l][actKey]);
  charts[canvasId]=new Chart(ctx,{type:'bar',data:{labels,datasets:[
    {label:'Est (เป้า)',data:est,backgroundColor:'#E4E4EE',borderRadius:5,barPercentage:.9,categoryPercentage:.7},
    {label:'Actual (จริง)',data:act,backgroundColor:kind==='imp'?'#A557F4':'#F72D74',borderRadius:5,barPercentage:.9,categoryPercentage:.7}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{boxWidth:12,padding:14,font:{size:12}}},
      tooltip:{callbacks:{
        label:c=>c.dataset.label+': '+fmt(c.parsed.y),
        afterBody:items=>{const i=items[0].dataIndex;const e=est[i],a=act[i];
          return e? 'Achieve: '+pct(a/e*100,0) : 'Achieve: —';}}}},
      scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'#EEEEF5'}},x:{grid:{display:false}}}}});}

function drawPlatChart(byPlat){kill('chPlat');const ctx=$('chPlat');if(!ctx)return;
  const ks=Object.keys(byPlat);if(!ks.length){ctx.parentElement.innerHTML='<div class="empty" style="padding:30px">ยังไม่มีข้อมูลแพลตฟอร์ม</div>';return;}
  charts.chPlat=new Chart(ctx,{type:'doughnut',data:{labels:ks,
    datasets:[{data:ks.map(k=>byPlat[k].follower),backgroundColor:PAL,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{legend:{position:'right',labels:{boxWidth:11,padding:11,font:{size:12}}},
      tooltip:{callbacks:{label:c=>c.label+': '+fmtK(c.parsed)+' followers'}}}}});}

function drawDetailPlatCharts(byPlat){const ks=Object.keys(byPlat);
  kill('chPlEng');const c1=$('chPlEng');if(c1)charts.chPlEng=new Chart(c1,{type:'bar',
    data:{labels:ks,datasets:[{label:'Engagement',data:ks.map(k=>byPlat[k].eng),backgroundColor:PAL,borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Engagement ตามแพลตฟอร์ม',font:{size:12.5,weight:'600'},color:'#55525F'}},
      scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'#EEEEF5'}},x:{grid:{display:false}}}}});
  kill('chPlReach');const c2=$('chPlReach');if(c2)charts.chPlReach=new Chart(c2,{type:'bar',
    data:{labels:ks,datasets:[{label:'Impression',data:ks.map(k=>byPlat[k].views),backgroundColor:'#A557F4',borderRadius:5}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Impression ตามแพลตฟอร์ม',font:{size:12.5,weight:'600'},color:'#55525F'}},
      scales:{y:{ticks:{callback:v=>fmtK(v)},grid:{color:'#EEEEF5'}},x:{grid:{display:false}}}}});}
